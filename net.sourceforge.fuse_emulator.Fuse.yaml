app-id: net.sourceforge.fuse_emulator.Fuse
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: fuse
finish-args:
  # X11 + XShm access
  - --share=ipc
  - --socket=x11
  # Sound
  - --socket=pulseaudio
  - --device=all
  # Network access (for Spectranet)
  - --share=network
  # Home directory (for loading and saving Spectrum software)
  - --filesystem=home
build-options:
  cppflags: -DG_DISABLE_CAST_CHECKS
  env:
    V: '1'
cleanup:
  - /include
  - /lib/*.a
  - /lib/*.la
  - /lib/*.so
  - /lib/pkgconfig
  - /share/applications/mimeinfo.cache
  - /share/icons/hicolor/icon-theme.cache
  - /share/man
modules:
  # Audiofile is used for loading Spectrum data from WAV files
  - name: libaudiofile
    config-opts:
      - --disable-docs
      - --disable-examples
      - --disable-flac
      - --disable-static
    sources:
      - type: archive
        url: http://audiofile.68k.org/audiofile-0.3.6.tar.gz
        sha256: cdc60df19ab08bfe55344395739bb08f50fc15c92da3962fac334d3bff116965
      - type: patch
        path: audiofile-build.patch
    cleanup:
      - /bin
  # Library to handle Spectrum snapshots, tapes and other files
  - name: libspectrum
    sources:
      - type: archive
        url: https://download.sourceforge.net/project/fuse-emulator/libspectrum/1.6.1/libspectrum-1.6.1.tar.gz
        sha256: 8c44080b012c9fcf79ba481c0134e200c9444717ef0e2e41edcf9df559c70153
  # Misc utilities (not needed if you simply want to run Fuse)
  - name: fuse-utils
    sources:
      - type: archive
        url: https://download.sourceforge.net/project/fuse-emulator/fuse-utils/1.4.5/fuse-utils-1.4.5.tar.gz
        sha256: 5f55af3fc692261e7e817a7fd276e1655c838303e24038f22fe9e422d61437ab
  # The emulator itself
  - name: fuse
    config-opts:
      - --bindir=/app/libexec
      - --with-x
      - --with-audio-driver=sdl2
      - --enable-desktop-integration
    rm-configure: true
    sources:
      - type: archive
        url: https://download.sourceforge.net/project/fuse-emulator/fuse/1.8.0/fuse-1.8.0.tar.gz
        sha256: 710656da455bf5fe9843ca80474dd6adc916fc9408476aebf878771801107374
      - type: patch
        path: sdl2-joystick.patch
      - type: script
        dest-filename: autogen.sh
        commands:
          - autoreconf -f -i -I m4
      # Move config file to the new location.
      # This wrapper will disappear in the next release.
      - type: script
        dest-filename: fuse
        commands:
          - |-
            binary="$(basename "$0")"
            old_cfg="$XDG_CONFIG_HOME/fuserc"
            new_cfg="$XDG_CONFIG_HOME/fuse-emulator/fuserc"
            if [ ! -f "$new_cfg" ] && [ -f "$old_cfg" ]; then
               install -m644 -D "$old_cfg" "$new_cfg"
               rm -f "$old_cfg"
            fi
            exec "/app/libexec/$binary" "$@"
      - type: shell
        commands:
          - install -m755 -D fuse /app/bin/fuse
  # The SDL version of the emulator
  - name: fuse-sdl
    config-opts:
      - --bindir=/app/libexec
      - --with-sdl2
      - --disable-desktop-integration
    make-args:
      - EXEEXT=-sdl
    make-install-args:
      - EXEEXT=-sdl
    rm-configure: true
    sources:
      - type: archive
        url: https://download.sourceforge.net/project/fuse-emulator/fuse/1.8.0/fuse-1.8.0.tar.gz
        sha256: 710656da455bf5fe9843ca80474dd6adc916fc9408476aebf878771801107374
      - type: patch
        path: sdl2-joystick.patch
      - type: script
        dest-filename: autogen.sh
        commands:
          - autoreconf -f -i -I m4
      - type: shell
        commands:
          - ln -s fuse /app/bin/fuse-sdl
          - cp /app/share/applications/net.sourceforge.fuse_emulator.Fuse.desktop /app/share/applications/net.sourceforge.fuse_emulator.Fuse.SDL.desktop
          - >-
             desktop-file-edit --set-key=Name --set-value='SDL Fuse'
             --set-key=Exec --set-value='fuse-sdl %f'
             --set-icon=$FLATPAK_ID
             --remove-category=GTK
             /app/share/applications/net.sourceforge.fuse_emulator.Fuse.SDL.desktop
